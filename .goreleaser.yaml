version: 2

project_name: oidc-token

builds:
  - id: oidc-token
    main: ./cmd/oidc-token
    binary: oidc-token
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: oidc-token
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc

release:
  github:
    owner: abinnovision
    name: oidc-token-cli
