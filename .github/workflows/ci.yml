name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0

  e2e:
    # Real-IdP compliance/smoke tier against a dexidp/dex container via
    # testcontainers-go; kept as its own job (not folded into the test
    # matrix) so container startup/image-pull time never blocks the fast
    # unit+mock-integration feedback loop. ubuntu-latest only: GitHub-hosted
    # macos-latest runners don't reliably have a working Docker daemon.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags e2e -race ./e2e/...

  release:
    # Tag + release only after the full test matrix is green, and only on
    # pushes to main (never on pull requests).
    needs: [test, lint, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # svu and the GoReleaser changelog need full history + tags
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Compute next version
        id: svu
        env:
          GOTOOLCHAIN: auto # setup-go@v6 defaults to 'local'; svu may need a newer toolchain than go.mod
        run: |
          go install github.com/caarlos0/svu/v3@latest
          current="$(svu current 2>/dev/null || echo v0.0.0)"
          next="$(svu next)"
          echo "current=${current} next=${next}"
          echo "next=${next}" >> "$GITHUB_OUTPUT"
          if [ "${next}" = "${current}" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag
        if: steps.svu.outputs.release == 'true'
        env:
          NEXT: ${{ steps.svu.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT" -m "$NEXT"
          git push origin "refs/tags/$NEXT"
      - name: Fetch homebrew-tap token from gh-token-broker
        if: steps.svu.outputs.release == 'true'
        id: gtb
        env:
          GTB_URL: ${{ secrets.GTB_URL }}
          GTB_AUDIENCE: gtb-abinnovision # must match the broker's configured oidc.audience
        run: |
          set -euo pipefail

          id_token_response=$(curl -sf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${GTB_AUDIENCE}")
          id_token=$(echo "${id_token_response}" | jq -r ".value")

          response=$(curl -sf \
            --header "Content-Type: application/json" \
            --request POST \
            --header "Authorization: Bearer ${id_token}" \
            --data '{"repositories":["abinnovision/homebrew-tap"],"permissions":{"contents":"write"}}' \
            "${GTB_URL}/token")

          token=$(echo "${response}" | jq -r ".token")
          if [ -z "${token}" ] || [ "${token}" = "null" ]; then
            echo "gh-token-broker returned no token" >&2
            exit 1
          fi

          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"
      - uses: goreleaser/goreleaser-action@v7
        if: steps.svu.outputs.release == 'true'
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.gtb.outputs.token }}
