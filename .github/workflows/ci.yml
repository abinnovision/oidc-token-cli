name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0

  e2e:
    # Real-IdP compliance/smoke tier against a dexidp/dex container via
    # testcontainers-go; kept as its own job (not folded into the test
    # matrix) so container startup/image-pull time never blocks the fast
    # unit+mock-integration feedback loop. ubuntu-latest only: GitHub-hosted
    # macos-latest runners don't reliably have a working Docker daemon.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags e2e -race ./e2e/...

  release-please:
    # Maintain the Release PR and, when it is merged, cut the tag + GitHub
    # Release. Runs only on pushes to main after the full test matrix is green.
    #
    # Authenticates with a short-lived GitHub App token brokered per-run via
    # oidc-token-cli's token-exchange against gh-token-broker (same mechanism as
    # the Homebrew step below), not the default GITHUB_TOKEN, for two reasons:
    #   1. release-please needs contents:write + issues:write (PR labels) +
    #      pull-requests:write; requested explicitly via --scope and minted by
    #      the broker (subject to its CEL policy authorizing this resource).
    #   2. PRs opened by GITHUB_TOKEN don't trigger workflows; an App token's do,
    #      so the Release PR gets the normal test matrix.
    needs: [test, lint, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the GitHub Actions OIDC subject token for the exchange
    outputs:
      versions: ${{ steps.rp.outputs.versions }}
    steps:
      - name: Install oidc-token-cli
        uses: jaxxstorm/action-install-gh-release@v3.0.0
        with:
          repo: abinnovision/oidc-token-cli
          cache: enable
      - name: Fetch release token from gh-token-broker
        id: gtb
        env:
          GTB_URL: ${{ secrets.GTB_URL }} # OIDC issuer base; exposes /.well-known/openid-configuration
        run: |
          set -euo pipefail

          token=$(oidc-token \
            --issuer "${GTB_URL}" \
            --client-id gtb-abinnovision \
            --grant-type token-exchange \
            --subject-token-source github-actions \
            --subject-token-type urn:ietf:params:oauth:token-type:id_token \
            --audience gtb-abinnovision \
            --resource abinnovision/oidc-token-cli \
            --scope "contents:write issues:write pull_requests:write" \
            --non-interactive)

          if [ -z "${token}" ]; then
            echo "gh-token-broker returned no token" >&2
            exit 1
          fi

          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"
      - uses: abinnovision/actions@run-release-please-v1
        id: rp
        with:
          token: ${{ steps.gtb.outputs.token }}

  goreleaser:
    # Build + publish only when release-please actually cut a release (i.e. a
    # Release PR was merged). Runs in the same workflow run rather than via an
    # `on: release` trigger, because releases created with GITHUB_TOKEN do not
    # emit workflow-triggering events.
    needs: release-please
    if: needs.release-please.outputs.versions != '{}'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for its build metadata
          ref: "v${{ fromJSON(needs.release-please.outputs.versions)['.'].packageVersion }}"
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install oidc-token-cli
        uses: jaxxstorm/action-install-gh-release@v3.0.0
        with:
          repo: abinnovision/oidc-token-cli
          cache: enable
      - name: Fetch homebrew-tap token from gh-token-broker
        id: gtb
        env:
          GTB_URL: ${{ secrets.GTB_URL }} # OIDC issuer base; exposes /.well-known/openid-configuration
        run: |
          set -euo pipefail

          token=$(oidc-token \
            --issuer "${GTB_URL}" \
            --client-id gtb-abinnovision \
            --grant-type token-exchange \
            --subject-token-source github-actions \
            --subject-token-type urn:ietf:params:oauth:token-type:id_token \
            --audience gtb-abinnovision \
            --resource abinnovision/homebrew-tap \
            --scope "contents:write" \
            --non-interactive)

          if [ -z "${token}" ]; then
            echo "gh-token-broker returned no token" >&2
            exit 1
          fi

          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.gtb.outputs.token }}

  snapshot:
    # Build the release binaries on every run (push + PR) and attach them to the
    # workflow run as downloadable artifacts — no tag, no GitHub release, no
    # cask. Grab them from the run's "Artifacts" section to test a pre-release
    # build. Uses GoReleaser snapshot mode, so it needs no tag and publishes
    # nothing.
    needs: [test, lint, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # GoReleaser derives the snapshot version from git history
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean
      - uses: actions/upload-artifact@v4
        with:
          name: oidc-token-cli-snapshot
          path: |
            dist/*.tar.gz
            dist/checksums.txt
          retention-days: 14
